name: Archive Blog

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  archive-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Archive blog page
        run: |
          curl -L "https://walidcumo08-ahvpy.wordpress.com/" -o blog_index.html
          
      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add blog_index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-archive update: $(date)" && git push)
